<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Évaluation — Maxime Sion · Boulanger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F2F1EE;
    --border: #E3E1DB;
    --border2: #D0CEC7;
    --text: #1C1B18;
    --text2: #6B6860;
    --text3: #9E9C96;
    --accent: #1B4FD8;
    --accent-light: #EBF0FD;
    --warn: #C47B1A;
    --warn-light: #FDF3E3;
    --danger: #C0392B;
    --danger-light: #FDECEA;
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
    --radius: 8px;
    --radius-sm: 5px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: var(--radius-sm);
  }
  .header-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .score-pill {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    background: var(--accent-light);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .btn {
    font-size: 12px;
    font-family: var(--sans);
    font-weight: 500;
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1640b8; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .stat-item {
    flex: 1;
    min-width: 100px;
    padding: 12px 20px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .stat-item:last-child { border-right: none; }
  .stat-val { font-size: 20px; font-weight: 600; color: var(--text); font-family: var(--mono); }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* FILTERS */
  .filter-bar {
    padding: 12px 24px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .filter-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-right: 4px; }
  .filter-btn {
    font-size: 11px;
    font-family: var(--sans);
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* MAIN */
  .main { padding: 20px 24px; max-width: 900px; margin: 0 auto; }

  /* BLOC */
  .bloc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: opacity 0.2s;
  }
  .bloc.done { opacity: 0.55; }
  .bloc.hidden { display: none; }
  .bloc.break-bloc { border-style: dashed; }

  .bloc-header {
    display: grid;
    grid-template-columns: 72px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .bloc-header:hover { background: var(--surface2); }

  .bloc-time {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }
  .bloc-time-dur { font-size: 10px; color: var(--text3); font-weight: 400; margin-top: 2px; }

  .bloc-info {}
  .bloc-title-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .bloc-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .bloc-sub { font-size: 11px; color: var(--text2); margin-top: 3px; line-height: 1.4; }

  .bloc-controls { display: flex; align-items: center; gap: 8px; }
  .check-btn {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: transparent;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .check-btn.checked { background: var(--green); border-color: var(--green); color: white; }
  .chevron { font-size: 14px; color: var(--text3); transition: transform 0.2s; display: flex; }
  .chevron.open { transform: rotate(180deg); }

  /* BODY */
  .bloc-body { display: none; border-top: 1px solid var(--border); }
  .bloc-body.open { display: block; }

  .body-section {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .body-section:last-child { border-bottom: none; }

  .section-head {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text3);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Campagnes */
  .camp-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px dashed var(--border);
  }
  .camp-row:last-child { border-bottom: none; }
  .camp-name { font-size: 12px; font-weight: 500; flex: 1; color: var(--text); }
  .camp-meta { font-size: 11px; color: var(--text2); white-space: nowrap; font-family: var(--mono); }
  .tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
  .tag-red { background: var(--danger-light); color: var(--danger); }
  .tag-orange { background: var(--warn-light); color: var(--warn); }
  .tag-blue { background: var(--accent-light); color: var(--accent); }
  .tag-green { background: var(--green-light); color: var(--green); }

  /* Questions */
  .q-list { display: flex; flex-direction: column; gap: 6px; }
  .q-row { display: flex; gap: 8px; align-items: flex-start; }
  .q-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    min-width: 18px;
    padding-top: 2px;
    font-weight: 500;
  }
  .q-text { font-size: 12px; color: var(--text); line-height: 1.55; flex: 1; font-style: italic; }
  .q-tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--surface2); color: var(--text3); white-space: nowrap; margin-top: 2px; font-family: var(--mono); }

  /* Signaux */
  .signal-list { display: flex; flex-direction: column; gap: 6px; }
  .signal-row { display: flex; gap: 8px; align-items: flex-start; }
  .signal-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .signal-text { font-size: 12px; color: var(--text2); line-height: 1.5; flex: 1; }
  .signal-text strong { font-weight: 600; color: var(--text); }

  /* Objectif */
  .obj-box {
    font-size: 12px;
    line-height: 1.6;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border-left: 3px solid;
  }
  .obj-eval { background: var(--accent-light); border-color: var(--accent); color: #0D3D6A; }
  .obj-warn { background: var(--warn-light); border-color: var(--warn); color: #6B3D05; }
  .obj-break { background: var(--green-light); border-color: var(--green); color: #1E4A09; }

  /* Notes */
  .notes-section { padding: 10px 16px; background: var(--surface2); }
  .notes-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .notes-section textarea {
    width: 100%;
    font-size: 12px;
    font-family: var(--sans);
    resize: vertical;
    min-height: 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 10px;
    color: var(--text);
    line-height: 1.5;
    transition: border-color 0.1s;
  }
  .notes-section textarea:focus { outline: none; border-color: var(--accent); }

  /* BOTTOM BAR */
  .bottom-bar {
    position: sticky;
    bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* PROGRESS */
  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 1px;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  @media (max-width: 600px) {
    .app-header { flex-wrap: wrap; }
    .stats-bar { gap: 0; }
    .stat-item { min-width: 80px; padding: 10px 12px; }
    .main { padding: 12px; }
    .bloc-header { grid-template-columns: 60px 1fr auto; gap: 8px; padding: 10px 12px; }
  }
</style>
</head>

let activeFilter = 'all';
const done = new Set();

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function renderAll() {
  const container = document.getElementById('main-container');
  container.innerHTML = '';
  let qTotal = 0;

  blocs.forEach((b, bi) => {
    const vis = activeFilter === 'all' || b.tags.includes(activeFilter);
    qTotal += b.qs.length;

    const el = document.createElement('div');
    el.className = 'bloc' + (done.has(bi) ? ' done' : '') + (b.isBreak ? ' break-bloc' : '') + (vis ? '' : ' hidden');
    el.id = `b-${bi}`;

    const cm = C[b.compte] || C['Global'];
    const thBadges = b.themes.map(t => {
      const m = T[t]||{bg:'#eee',c:'#333'};
      return `<span class="badge" style="background:${m.bg};color:${m.c}">${t}</span>`;
    }).join('');

    const hdr = document.createElement('div');
    hdr.className = 'bloc-header';
    hdr.innerHTML = `
      <div class="bloc-time">${b.time}<div class="bloc-time-dur">${b.dur}</div></div>
      <div class="bloc-info">
        <div class="bloc-title-row">
          <span class="bloc-title">${b.title}</span>
          <span class="badge" style="background:${cm.bg};color:${cm.c}">${b.compte}</span>
          ${thBadges}
        </div>
        <div class="bloc-sub">${b.sub}</div>
      </div>
      <div class="bloc-controls">
        <button class="check-btn ${done.has(bi)?'checked':''}" id="chk-${bi}" onclick="event.stopPropagation();toggleDone(${bi})" title="Marquer complété">${done.has(bi)?'✓':''}</button>
        <div class="chevron" id="chv-${bi}">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
    `;
    hdr.addEventListener('click', () => toggleBody(bi));

    const body = document.createElement('div');
    body.className = 'bloc-body';
    body.id = `bd-${bi}`;

    if (b.camps.length) {
      const s = document.createElement('div');
      s.className = 'body-section';
      s.innerHTML = `<div class="section-head">🎯 Campagnes à analyser en live</div>`;
      b.camps.forEach(c => {
        const r = document.createElement('div');
        r.className = 'camp-row';
        r.innerHTML = `<span class="camp-name">${c.n}</span><span class="camp-meta">${c.m}</span>${c.a.map(a=>`<span class="tag ${a.c}">${a.l}</span>`).join('')}`;
        s.appendChild(r);
      });
      body.appendChild(s);
    }

    if (b.qs.length) {
      const s = document.createElement('div');
      s.className = 'body-section';
      s.innerHTML = `<div class="section-head">💬 Questions copilote</div><div class="q-list"></div>`;
      const ql = s.querySelector('.q-list');
      b.qs.forEach((q,i) => {
        const r = document.createElement('div');
        r.className = 'q-row';
        r.innerHTML = `<span class="q-num">${String(i+1).padStart(2,'0')}</span><span class="q-text">${q.q}</span>${q.d?`<span class="q-tag">${q.d}</span>`:''}`;
        ql.appendChild(r);
      });
      body.appendChild(s);
    }

    if (b.sigs.length) {
      const s = document.createElement('div');
      s.className = 'body-section';
      s.innerHTML = `<div class="section-head">⚡ Signaux & ce que ça révèle</div><div class="signal-list"></div>`;
      const sl = s.querySelector('.signal-list');
      b.sigs.forEach(sig => {
        const r = document.createElement('div');
        r.className = 'signal-row';
        r.innerHTML = `<div class="signal-dot" style="background:${sig.col}"></div><span class="signal-text">${sig.txt}</span>`;
        sl.appendChild(r);
      });
      body.appendChild(s);
    }

    if (b.obj) {
      const s = document.createElement('div');
      s.className = 'body-section';
      s.innerHTML = `<div class="obj-box ${b.obj.s}">${b.obj.t}</div>`;
      body.appendChild(s);
    }

    const ns = document.createElement('div');
    ns.className = 'notes-section';
    ns.innerHTML = `<div class="notes-label">Notes — ${b.title}</div><textarea id="nt-${bi}" placeholder="Observations sur ce bloc…"></textarea>`;
    body.appendChild(ns);

    el.appendChild(hdr);
    el.appendChild(body);
    container.appendChild(el);
  });

  document.getElementById('q-total').textContent = qTotal;
}

function toggleBody(bi) {
  const bd = document.getElementById(`bd-${bi}`);
  const cv = document.getElementById(`chv-${bi}`);
  if (!bd) return;
  const open = bd.classList.contains('open');
  bd.classList.toggle('open', !open);
  cv?.classList.toggle('open', !open);
}

function toggleDone(bi) {
  done.has(bi) ? done.delete(bi) : done.add(bi);
  const n = done.size;
  document.getElementById('done-score').textContent = `${n} / ${blocs.length} blocs`;
  document.getElementById('pct-done').textContent = Math.round(n/blocs.length*100) + '%';
  document.getElementById('progress-fill').style.width = (n/blocs.length*100) + '%';
  const chk = document.getElementById(`chk-${bi}`);
  if (chk) { chk.classList.toggle('checked', done.has(bi)); chk.textContent = done.has(bi) ? '✓' : ''; }
  document.getElementById(`b-${bi}`)?.classList.toggle('done', done.has(bi));
}

function exportNotes() {
  const lines = [
    'PLANNING JOURNÉE — ÉVALUATION MAXIME SION',
    `Date : ${new Date().toLocaleDateString('fr-FR')}`,
    'Compte : Boulanger', ''
  ];
  blocs.forEach((b, bi) => {
    lines.push(`\n${'═'.repeat(60)}`);
    lines.push(`[${b.id}] ${b.time} (${b.dur}) — ${b.title}`);
    if (b.camps.length) { lines.push('\nCAMPAGNES :'); b.camps.forEach(c => lines.push(`  · ${c.n} — ${c.m}`)); }
    if (b.qs.length) { lines.push('\nQUESTIONS :'); b.qs.forEach((q,i) => lines.push(`  ${i+1}. ${q.q}`)); }
    const note = document.getElementById(`nt-${bi}`)?.value;
    if (note) lines.push(`\nNOTES :\n${note}`);
    if (done.has(bi)) lines.push('\n[✓ COMPLÉTÉ]');
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'}));
  a.download = `planning_evaluation_maxime_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
}

function resetAll() {
  done.clear();
  document.getElementById('done-score').textContent = `0 / ${blocs.length} blocs`;
  document.getElementById('pct-done').textContent = '0%';
  document.getElementById('progress-fill').style.width = '0%';
  renderAll();
}

renderAll();
</script>
